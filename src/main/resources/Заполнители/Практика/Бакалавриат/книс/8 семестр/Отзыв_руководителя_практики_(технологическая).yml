типПрактикиРодительный: "производственной практики (технологической (проектно-технологической) практики)"
срокиПрохожденияПрактикиСловами: "с «19» января 2026 года по «07» марта 2026 года."
компетенции:
  УК-1 Способен осуществлять поиск, критический анализ и синтез информации, применять системный подход для решения поставленных задач:
    - |
      УК-1.1 Знать: методики сбора и обработки информации; актуальные российские и зарубежные источники информации в сфере профессиональной деятельности; метод системного анализа
      - знать основные методики поиска и структуризации информации в российских и зарубежных источниках в рамках предметной области.
    - |
      УК- 1.2 Уметь: применять методики поиска, сбора и обработки информации; осуществлять критический анализ и синтез информации, полученной из разных источников
      - уметь критически осмыслить информацию, полученную из различных источников, в контексте решаемой задачи.
    - |
      УК- 1.3 Владеть: методами поиска, сбора и обработки, критического анализа и синтеза информации; методикой системного подхода для решения поставленных задач
      -уметь структурировать информацию, применительно к проблематике профессиональной области.
  УК- 6 Способен управлять своим временем, выстраивать и реализовывать траекторию саморазвития на основе принципов образования в течение всей жизни:
    - |
      УК- 6.1 Знать: основные приемы эффективного управления собственным временем; основные методики самоконтроля, саморазвития и самообразования на протяжении всей жизни
      - способен оценивать и планировать временные и интеллектуальные ресурсы для решения поставленных задач.
    - |
      УК – 6.2 Уметь: эффективно планировать и контролировать собственное время; использовать методы саморегуляции, саморазвития и самообучения;
      -уметь самостоятельно организовать собственную деятельность по своевременному выполнению задач в рамках индивидуального задания на практику.
    - |
      УК-6.3 Владеть: методами управления собственным временем; технологиями приобретения, использования и обновления социокультурных и профессиональных знаний, умений, и навыков; методиками саморазвития и самообразования в течение всей жизни
      - владеть навыками самоорганизации и самообразования в контексте своевременного выполнения индивидуального задания на практику, в соответствии с требованиями к содержанию.
  ОПК-1 Способен применять естественнонаучные и общеинженерные знания, методы математического анализа и моделирования, теоретического и экспериментального исследования в профессиональной деятельности:
    - |
      ОПК-1.3. Владеть: навыками теоретического и экспериментального исследования объектов профессиональной деятельности;
      -уметь применять на практике алгоритмы, методы и технологии, необходимые для решения задач профессиональной области, сформулированных в индивидуальном задании на практику.
