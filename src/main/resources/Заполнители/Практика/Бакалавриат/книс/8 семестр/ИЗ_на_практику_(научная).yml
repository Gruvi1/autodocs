компетенцииЗаданияПрактики: |
  УК -1.1 - Знать: методики сбора и обработки информации; актуальные российские и зарубежные источники информации в сфере профессиональной деятельности; метод системного анализа
  Знать признанные профессиональным сообществом российские и зарубежные источники информации применительно к решаемой задаче.

  УК -1.2 - Уметь: применять методики поиска, сбора и обработки информации; осуществлять критический анализ и синтез информации, полученной из разных источников
  Уметь оценить степень актуальности, достоверности и релевантности найденной информации в контексте решаемой профессиональной задачи.

  УК – 1.3 - Владеть: методами поиска, сбора и обработки, критического анализа и синтеза информации; методикой системного подхода для решения поставленных задач
  Уметь систематизировать информацию в соответствии со спецификой решаемой задачи.

  ОПК-1.3. Владеть: навыками теоретического и экспериментального исследования объектов профессиональной деятельности.
  Уметь применять на практике методы теоретического и экспериментального моделирования в контексте решаемой задачи профессиональной области.

  ОПК-3.1 Знать: принципы, методы и средства решения стандартных задач профессиональной деятельности на основе информационной и библиографической культуры с применением информационно- коммуникационных технологий и с учетом основных требований информационной безопасности.
  Знать основные требования информационной безопасности в области профессиональной деятельности в рамках решаемой задачи.

  ОПК-3.2 Уметь: решать стандартные задачи профессиональной деятельности на основе информационной и библиографической культуры с применением информационно- коммуникационных технологий и с учетом основных требований информационной безопасности.
  Уметь применять основные требования информационной безопасности в области профессиональной деятельности в рамках решаемой задачи

  ОПК-3.3 Владеть: навыками подготовки обзоров, аннотаций, составления рефератов, научных докладов, публикаций и библиографии по научно- исследовательской работе с учетом требований информационной безопасности.
  Уметь подготовить обзор, аннотацию, библиографический список с учетом требований информационной безопасности.

  ОПК-9.3 Владеть: способами описания методики использования программного средства для решения конкретной задачи в виде документа, презентации или видеоролика.
  Уметь разработать материалы в соответствии с заданными требованиями для использования конкретного разрабатываемого программного средства.
