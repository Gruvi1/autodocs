типПрактикиРодительный: "учебной практики (ознакомительной практики)"
срокиПрохожденияПрактики: "с 29.09.2025 г. по 23.12.2025 г."
компетенцииЗаданияПрактики: |
  УК -1.1 - Знать: методики сбора и обработки информации; актуальные российские и зарубежные источники информации в сфере профессиональной деятельности; метод системного анализа
  Знать основные актуальные российские и зарубежные источники информации в предметной области, состояние исследований в рамках предметной области, основные аналоги решения поставленной задачи

  УК -1.2 - Уметь: применять методики поиска, сбора и обработки информации; осуществлять критический анализ и синтез информации, полученной из разных источников
  Уметь грамотно и обоснованно сделать обзор существующих решений для конкретной задачи профессиональной области.

  УК – 1.3 - Владеть: методами поиска, сбора и обработки, критического анализа и синтеза информации; методикой системного подхода для решения поставленных задач
  Уметь произвести сравнение разрабатываемого решения для задачи в предметной области с аналогами, используя информацию из достоверных источников.

  УК – 6.1 - Знать: основные приемы эффективного управления собственным временем; основные методики самоконтроля, саморазвития и самообразования на протяжении всей жизни
  Способен оценивать и планировать ресурсы для решения поставленных задач.

  УК – 6.2 - Уметь: эффективно планировать и контролировать собственное время; использовать методы саморегуляции, саморазвития и самообучения
  Уметь сформировать и предоставить необходимые отчетные материалы по практике в соответствии с требованиями по срокам и содержанию, указанным в индивидуальном задании на практику.

  УК – 6.3 - Владеть: методами управления собственным временем; технологиями приобретения, использования и обновления социо-культурных и профессиональных знаний, умений, и навыков; методиками саморазвития и самообразования в течение всей жизни
  Уметь самостоятельно выполнить объем работ, указанных в индивидуальном задании на практику, в соответствии с заданными сроками и требованиями к содержанию

  ПКС – 2.1 - Уметь применять современные инструментальные средства для разработки компонентов аппаратно-программных комплексов и баз данных
  Уметь применять на практике инструментальные средства, необходимые для решения конкретных задач, сформулированных в индивидуальном задании на практику.

  ПКС – 2.2. - уметь применять современные технологии программирования для разработки компонентов аппаратно-программных комплексов и баз данных
  Уметь применять на практике актуальные технологии программирования, необходимые для решения конкретных задач, в соответствии с индивидуальным заданием на практику.
