типПрактикиРодительный: "производственной практики (научно-исследовательской работы)"
срокиПрохожденияПрактики: "с 29.09.2025 г. по 23.12.2025 г."
компетенцииЗаданияПрактики: |
  УК-1.2. Уметь: применять методики поиска, сбора и обработки информации; осуществлять критический анализ и синтез информации, полученной из разных источников
  - умеет грамотно и обоснованно сделать обзор существующих решений для конкретной задачи профессиональной области;

  УК-1.3Владеть: методами поиска, сбора и обработки, критического анализа и синтеза информации; методикой системного подхода для решения поставленных задач
   - способен самостоятельно осуществлять поиск, анализ и синтез информации, необходимой для его повседневной и профессиональной деятельности;

  УК-6.1. Знать: основные приемы эффективного управления собственным временем; основные методики самоконтроля, саморазвития и самообразования на протяжении всей жизни
  - способен оценивать и планировать ресурсы для решения поставленных задач;

  ОПК-3.1. Знать: принципы, методы и средства решения стандартных задач профессиональной деятельности на основе информационной и библиографической культуры с применением информационно- коммуникационных технологий и с учетом основных требований информационной безопасности
  -знает принципы, методы и средства решения стандартных задач профессиональной деятельности;

  ОПК-3.2. Уметь: решать стандартные задачи профессиональной деятельности на основе информационной и библиографической культуры с применением информационно- коммуникационных технологий и с учетом основных требований информационной безопасности
   - применяет на практике знания, полученные в результате анализа литературы, для решения задач профессиональной деятельности;

  ОПК-3.3 Владеть: навыками подготовки обзоров, аннотаций, составления рефератов, научных докладов, публикаций и библиографии по научно- исследовательской работе с учетом требований информационной безопасности
  - владеет навыками подготовки обзоров, рефератов, отчетов, докладов.
