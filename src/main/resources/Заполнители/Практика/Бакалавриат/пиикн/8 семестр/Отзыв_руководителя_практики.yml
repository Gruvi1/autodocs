типПрактикиРодительный: "производственной практики (преддипломной практики)"
срокиПрохожденияПрактикиСловами: "с «02» февраля 2026 года по «02» мая 2026 года."
компетенции:
  УК-1. Способен осуществлять поиск, критический анализ и синтез информации, применять системный подход для решения поставленных задач.:
    - |
      УК-1.1 Знать: методики сбора и обработки информации; актуальные российские и зарубежные источники информации в сфере профессиональной деятельности; метод системного анализа;
      -знает актуальные российские и зарубежные источники информации, методики сбора и обработки информации для решения профессиональной задачи, сформулированной в индивидуальном задании на практику; знает сущность и цели применения метода системного анализа.
  УК-6. Способен управлять своим временем, выстраивать и реализовывать траекторию саморазвития на основе принципов образования в течение всей жизни:
    - |
      УК-6.1 Знать: основные приемы эффективного управления собственным временем; основные методики самоконтроля, саморазвития и самообразования на протяжении всей жизни;
      -знает, какие методы управления собственным временем, методики самоконтроля, саморазвития и самообразования наиболее эффективны при решении профессиональной задачи, сформулированной в индивидуальном задании на практику.
    - |
      УК-6.2 Уметь: эффективно планировать и контролировать собственное время; использовать методы саморегуляции, саморазвития и самообучения;
      -умеет эффективно планировать и контролировать собственное время; использовать методы саморегуляции, саморазвития и самообучения.
    - |
      УК-6.3 Владеть: методами управления собственным временем; технологиями приобретения, использования и обновления социокультурных и профессиональных знаний, умений, и навыков; методиками саморазвития и самообразования в течение всей жизни;
      - владеет навыками распределения времени и других ресурсов для достижения поставленных целей и задач. Самостоятельно определяет и осваивает материал, необходимый для достижения поставленных целей.
  ПКС-2 Способен разрабатывать компоненты системных программных продуктов:
    - |
      ПКС-2.3 Уметь применять знания в области разработки ПО в предметной области;
      - способен разработать/модернизировать ПО в соответствии с техническим заданием.
    
