типПрактикиРодительный: "учебной практики (эксплуатационной практики)"
срокиПрохожденияПрактикиСловами: "с «02» февраля 2026 года по «28» мая 2026 года."
компетенции:
  ОПК-5 Способен инсталлировать программное и аппаратное обеспечение для информационных и автоматизированных систем.:
    - |
      ОПК-5.3 Владеть: навыками инсталляции программного и аппаратного обеспечения информационных и автоматизированных систем;
      -демонстрирует навыки по установке ПО, по установке и настройке аппаратных компонентов информационных систем
  ОПК-7 Способен участвовать в настройке и наладке программно-аппаратных комплексов.:
    - |
      ОПК-7.1 Знать: методы настройки, наладки программно-аппаратных комплексов;
      - демонстрирует знания по особенностям функционирования операционных систем и сетей.
    - |
      ОПК-7.2 Уметь: анализировать техническую документацию, производить настройку, наладку и тестирование программно-аппаратных комплексов;
      -анализирует техническую документацию; проводит настройку ПО в соответствии с техническим заданием.
    - |
      ОПК-7.3 Владеть: навыками проверки работоспособности программно-аппаратных комплексов;
      -проводит проверку корректности функционирования установленного ПО и программно-аппаратных комплексов.