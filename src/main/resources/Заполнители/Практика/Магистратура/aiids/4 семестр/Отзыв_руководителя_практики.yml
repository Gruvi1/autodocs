типПрактикиРодительный: "производственной практики (научно-исследовательской работы)"
срокиПрохожденияПрактикиСловами: "с «02» февраля 2026 года по «13» мая 2026 года."
компетенции:
  УК-1. Способен осуществлять критический анализ проблемных ситуаций на основе системного подхода, вырабатывать стратегию действий:
    - |
      УК-1.1.  Выявляет проблемную ситуацию, определяет этапы ее разрешения
      - знать основы декомпозиции структуры работ, основные этапы реализации;
    - |
      УК-1.2. Находит, критически анализирует и выбирает информацию, необходимую для выработки стратегии действий по разрешению проблемной ситуации
      - уметь сформировать иерархическую структуру работ и стратегический план деятельности по достижению результата;
    - |
      УК-1.3.  Рассматривает варианты решения проблемной ситуации на основе системного подхода и разрабатывает стратегию действий
      - уметь формулировать результат работы в виде комплекса промежуточных результатов реализации плана работ в соответствии с заданием на практику.
  УК-6. Способен определять и реализовывать приоритеты собственной деятельности и способы ее совершенствования на основе самооценки:
    - |
      УК-6.1. Формулирует цели собственной деятельности, определяет пути их достижения
      - знать способы оценки уровня своих профессиональных способностей, применительно к формируемым компетенциям в рамках практики
    - |
      УК-6.2. Определяет приоритеты собственной деятельности, выстраивает планы их достижения
      - уметь сформировать индивидуальный план достижения результатов, указанных в индивидуальном задании на практику
    - |
      УК-6.3. Оценивает имеющиеся ресурсы и использует их для решения задач самоорганизации и саморазвития
      - уметь оценить необходимость развития различных аспектов индивидуальных профессиональных знаний, умений, навыков и организовывать собственную деятельность по достижению требуемого уровня развития.
  ОПК-3. Способен анализировать профессиональную информацию, выделять в ней главное, структурировать, оформлять и представлять в виде аналитических обзоров с обоснованными выводами и рекомендациями:
    - |
      ОПК-3.1. Знать: принципы, методы и средства анализа и структурирования профессиональной информации
      - знать основы критического анализа и обработки профессиональной информации в контексте решаемой задачи;
    - |
      ОПК-3.2. Уметь: анализировать профессиональную информацию, выделять в ней главное, структурировать, оформлять и представлять в виде аналитических обзоров
      - уметь критически подойди к профессиональной информацию в контексте конкретной задачи профессиональной области;
    - |
      ОПК-3.3. Владеть: навыками подготовки научных докладов, публикаций и аналитических обзоров с обоснованными выводами и рекомендациями
      -уметь обосновать полученные результаты, представить их в форме научных и технических документов в рамках практики.
  ОПК-4. Способен применять на практике новые научные принципы и методы исследований:
    - |
      ОПК-4.1. Знать: новые научные принципы и методы исследований
      - знать актуальное состояние и проблематику профессиональной сферы;
    - |
      ОПК-4.2. Умеет: применять на практике новые научные принципы и методы исследований
      - уметь обосновать применение научных подходов к решению конкретной профессиональной задачи;
    - |
      ОПК-4.3. Владеть: навыками применения новых научных принципов и методов исследования для решения профессиональных задач
      - уметь применять актуальные подходы к решению конкретной профессиональной задачи в рамках практики.
  ОПК-6. Способен разрабатывать компоненты программно-аппаратных комплексов обработки информации и автоматизированного проектирования:
    - |
      ОПК-6.1. Знать: аппаратные средства и платформы инфраструктуры информационных технологий, виды, назначение, архитектуру, методы разработки и администрирования программно-аппаратных комплексов объекта профессиональной деятельности
      - знать основные ИКТ технологии для решения задачи в профессиональной области;
    - |
      ОПК-6.2. Уметь: анализировать техническое задание, разрабатывать и оптимизировать программный код для решения задач обработки информации и автоматизированного проектирования
      - уметь реализовать программный код для решения задач обработки информации и автоматизированного проектирования в соответствии с техническим заданием;
    - |
      ОПК-6.3. Владеть: навыками составления технической документации по использованию и настройке компонентов программно-аппаратного комплекса
      - уметь разрабатывать необходимую техническую документацию в соответствии с заданием на практику.
    


