типПрактикиРодительный: "учебной практики (технологической (проектно-технологической)"
срокиПрохожденияПрактики: "с 10.11.2025 г. по 23.12.2025 г."
компетенцииЗаданияПрактики: |
  УК-1.1 Выявляет проблемную ситуацию, определяет этапы ее разрешения;
  
  УК-1.2 Находит, критически анализирует и выбирает информацию, необходимую для выработки стратегии действий по разрешению проблемной ситуации;
  
  УК-1.3 Рассматривает варианты решения проблемной ситуации на основе системного подхода и разрабатывает стратегию действий.

  УК-6.1 Формулирует цели собственной деятельности, определяет пути их достижения;
  
  УК-6.2 Определяет приоритеты собственной деятельности, выстраивает планы их достижения;
  
  УК-6.3 Оценивает имеющиеся ресурсы и использует их для решения задач самоорганизации и саморазвития.

  ПКС-1.1Разрабатывать программные решения на основе аналитики больших данных в области профессиональной деятельности;
  
  ПКС-1.2 Разрабатывать новые и адаптировать существующие методы, модели, алгоритмы, технологии и инструментальные средства работы с большими данными.
