компетенцииЗаданияПрактики: |
  ОПК-8.1. Знать: методы и средства разработки программного обеспечения, методы управления проектами разработки программного обеспечения, способы организации проектных данных, нормативно-технические документы (стандарты и регламенты) по разработке программных средств и проектов;
  
  ОПК-8.2. Уметь: выбирать средства разработки, оценивать сложность проектов, планировать ресурсы, контролировать сроки выполнения и оценивать качество полученного результата.;
  
  ОПК-8.3. Владеть: навыками разработки технического задания, составления планов, распределения задач, тестирования и оценки качества программных средств.
