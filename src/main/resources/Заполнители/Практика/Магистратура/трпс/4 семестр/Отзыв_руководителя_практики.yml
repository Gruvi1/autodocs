типПрактикиРодительный: "производственной практики (научно-исследовательской работы)"
срокиПрохожденияПрактикиСловами: "с «02» февраля 2026 года по «13» мая 2026 года."
компетенции:
  УК-6 Способен определять и реализовывать приоритеты собственной деятельности и способы ее совершенствования на основе самооценки:
    - |
      УК-6.1 Знать: методики самооценки, самоконтроля и саморазвития с использованием подходов здоровьесбережения;
      - знает методики самооценки, самоконтроля и саморазвития.
    - |
      УК-6.2 Уметь: решать задачи собственного личностного и профессионального развития, определять и реализовывать приоритеты совершенствования собственной деятельности; применять методики самооценки и самоконтроля; применять методики, позволяющие улучшить и сохранить здоровье в процессе жизнедеятельности;
      - умеет решать задачи собственного личностного и профессионального развития, определять и реализовывать приоритеты совершенствования собственной деятельности.
    - |
      УК-6.3 Владеть: технологиями и навыками управления своей познавательной деятельностью и ее совершенствования на основе самооценки, самоконтроля и принципов самообразования в течение всей жизни, в том числе с использованием здоровьесберегающих подходов и методик;
      - владеет технологиями и навыками управления своей познавательной деятельностью и ее совершенствования на основе самооценки, самоконтроля и принципов самообразования.
  ОПК-3. Способен анализировать профессиональную информацию, выделять в ней главное, структурировать, оформлять и представлять в виде аналитических обзоров с обоснованными выводами и рекомендациями:
    - |
      ОПК-3.1. Знать: принципы, методы и средства анализа и структурирования профессиональной информации;
      - знает принципы, методы и средства анализа и структурирования профессиональной информации.
    - |
      ОПК-3.2. Уметь: анализировать профессиональную информацию, выделять в ней главное, структурировать, оформлять и представлять в виде аналитических обзоров;
      - способен анализировать профессиональную информацию, выделять в ней главное, структурировать, оформлять и представлять в виде аналитических обзоров.
    - |
      ОПК-3.3. Владеть: навыками подготовки научных докладов, публикаций и аналитических обзоров с обоснованными выводами и рекомендациями;
      - владеет навыками подготовки научных докладов, публикаций и аналитических обзоров с обоснованными выводами и рекомендациями.
  ОПК-4 Способен применять на практике новые научные принципы и методы исследований:
    - |
      ОПК-4.1. Знать: новые научные принципы и методы исследований;
      - знает научные принципы и методы исследований.
    - |
      ОПК-4.2. Умеет: применять на практике новые научные принципы и методы исследований;
      -способен применять на практике новые принципы и методы исследований.
    - |
      ОПК-4.3. Владеть: навыками применения новых научных принципов и методов исследования для решения профессиональных задач;
      - владеет навыками применения новых научных принципов и методов исследования для решения профессиональных задач.
  ОПК-5. Способен разрабатывать и модернизировать программное и аппаратное обеспечение информационных и автоматизированных систем:
    - |
      ОПК-5.1. Знать современное программное и аппаратное обеспечение информационных и автоматизированных систем;
      - знает современное программное и аппаратное обеспечение информационных и автоматизированных систем.
    - |
      ОПК-5.2. Уметь: модернизировать программное и аппаратное обеспечение информационных и автоматизированных систем для решения профессиональных задач;
      - способен модернизировать программное и аппаратное обеспечение информационных и автоматизированных систем для решения профессиональных задач.
    - |
      ОПК-5.3. Владеть: навыками разработки программного и аппаратного обеспечения информационных и автоматизированных систем для решения профессиональных задач;
      - владеет навыками разработки программного и аппаратного обеспечения информационных и автоматизированных систем для решения профессиональных задач.