типПрактикиРодительный: "учебной практики (ознакомительной практики)"
срокиПрохожденияПрактикиСловами: "с «09» февраля 2026 года по «30» мая 2026 года."
компетенции:
  УК-6 Способен определять и реализовывать приоритеты собственной деятельности и способы ее совершенствования на основе самооценки:
    - |
      УК-6.1 Знать: методики самооценки, самоконтроля и саморазвития с использованием подходов здоровьесбережения;
      - проводит самооценку своих знаний для дальнейшего саморазвития.
    - |
      УК-6.2 Уметь: решать задачи собственного личностного и профессионального развития, определять и реализовывать приоритеты совершенствования собственной деятельности; применять методики самооценки и самоконтроля; применять методики, позволяющие улучшить и сохранить здоровье в процессе жизнедеятельности;
      - демонстрирует способность решать задачи собственного личностного и профессионального развития.
    - |
      УК-6.3 Владеть: технологиями и навыками управления своей познавательной деятельностью и ее совершенствования на основе самооценки, самоконтроля и принципов самообразования в течение всей жизни, в том числе с использованием здоровьесберегающих подходов и методик;
      - демонстрирует владение технологиями и навыками управления своей познавательной деятельностью и ее совершенствования на основе самооценки, самоконтроля и принципов самообразования.
  ПКС-2 Способен осуществлять интеграцию разработанного программного обеспечения:
    - |
      ПКС-2.1 Знать основные методы разработки программного обеспечения;
      - знает основные подходы к разработке программного обеспечения.
    - |
      ПКС-2.2 Уметь применять на практике программные средства и платформы информационных технологий;
      - способен на практике использовать программные средства и платформы информационных технологий.
    - |
      ПКС-2.3 Уметь анализировать особенности предметной области и контекста решаемой задачи для обоснованного выбора инструментария;
      - демонстрирует навыки анализа особенностей предметной области и контекста решаемой задачи для обоснованного выбора инструментария.