компетенцииЗаданияПрактики: |
  УК-6.1 Знать: методики самооценки, самоконтроля и саморазвития с использованием подходов здоровьесбережения
  
  УК-6.2 Уметь: решать задачи собственного личностного и профессионального развития, определять и реализовывать приоритеты совершенствования собственной деятельности; применять методики самооценки и самоконтроля; применять методики, позволяющие улучшить и сохранить здоровье в процессе жизнедеятельности
  
  УК-6.3 Владеть: технологиями и навыками управления своей познавательной деятельностью и ее совершенствования на основе самооценки, самоконтроля и принципов самообразования в течение всей жизни, в том числе с использованием здоровьесберегающих подходов и методик.

  ПКС-2.1 Знать основные методы разработки программного обеспечения
  
  ПКС-2.2 Уметь применять на практике программные средства и платформы информационных технологий
  
  ПКС-2.3 Уметь анализировать особенности предметной области и контекста решаемой задачи для обоснованного выбора инструментария
