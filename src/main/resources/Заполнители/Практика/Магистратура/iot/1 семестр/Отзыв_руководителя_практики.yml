типПрактикиРодительный: "учебной практики (ознакомительной практики)"
срокиПрохожденияПрактикиСловами: "с «10» ноября 2025 года по «23» декабря 2025 года."
компетенции:
  УК-1 Способен осуществлять критический анализ проблемных ситуаций на основе системного подхода, вырабатывать стратегию действий:
    - |
      УК-1.1 Выявляет проблемную ситуацию, определяет этапы ее разрешения.
      - знать методы системного и критического анализа.
    - |
      УК-1.2 Находит, критически анализирует и выбирает информацию, необходимую для выработки стратегии действий по разрешению проблемной ситуации.
      - уметь анализировать проблемную ситуацию и формировать конструктивную стратегию решения.
    - |
      УК-1.3 Рассматривает варианты решения проблемной ситуации на основе системного подхода и разрабатывает стратегию действий.
      -уметь формулировать этапы и задачи для достижения результатов, обеспечивающих выполнение индивидуального задания на практику.
  УК-6 Способен определять и реализовывать приоритеты собственной деятельности и способы ее совершенствования на основе самооценки:
    - |
      УК-6.1 Формулирует цели собственной деятельности, определяет пути их достижения.
      - знать границы применимости индивидуальных ресурсов, в рамках выполнения индивидуального задания на практику.
    - |
      6.2 Определяет приоритеты собственной деятельности, выстраивает планы их достижения.
      -уметь оценивать собственные ресурсы для оптимизации их использования при выполнении поставленных задач.
    - |
      УК-6.3 Оценивает имеющиеся ресурсы и использует их для решения задач самоорганизации и саморазвития.
      - уметь расставлять приоритеты личностного роста и саморазвития в рамках выполнения индивидуального задания на практику.
  ПКС-1 Способен проводить исследования и разработки с целью создания систем интернета вещей:
    - |
      ПКС-1.1. Выполняет прототипирование и технологические эксперименты с целью детализации параметров технических решений для систем интернета вещей.
      - уметь детализировать параметры технического решения в рамках сформулированного задания на практику.
    - |
      ПКС-1.2. Разрабатывает программно-аппаратное обеспечение для решения задач в области интернета вещей.
      - уметь разработать программно-аппаратное решение конкретной задачи интернета вещей, используя актуальные подходы и технологии.
    


