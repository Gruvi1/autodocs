типПрактикиРодительный: "производственной практики (технологической (проектно-технологической) практики)"
срокиПрохожденияПрактики: "с 09.02.2026 г. по 30.05.2026 г."
компетенцииЗаданияПрактики: |
  УК-1.1 Выявляет проблемную ситуацию, определяет этапы ее разрешения:
  -знать основы системного подхода для выявления и решения проблемной ситуации;
  
  УК-1.2 Находит, критически анализирует и выбирает информацию, необходимую для выработки стратегии действий по разрешению проблемной ситуации:
  - уметь сформировать поэтапный план реализации работ в соответствии с индивидуальным заданием на практику и требованиями к представлению результатов;
  
  УК-1.3 Рассматривает варианты решения проблемной ситуации на основе системного подхода и разрабатывает стратегию действий:
  -уметь реализовать поэтапный план работы в соответствии с индивидуальным заданием на практику и требованиями к представлению результатов;
  
  УК-2.1. Выбирает и обосновывает методы управления проектом на всех этапах его жизненного цикла;
  -знать основные этапы индивидуального задания на практику и их содержание.
  
  УК-2.2. Определяет цели проекта, расставляет приоритеты и правильно использует имеющиеся ресурсы.
  -уметь сформулировать основные мероприятия для выполнения индивидуального задания на практику;
  
  УК-2.3. Представляет и защищает самостоятельно разработанный проект в области своей профессиональной деятельности, включая исследовательскую работу.
   -уметь оценить потребность в ресурсах в рамках выполнения задания на практику;

  УК-6.1 Формулирует цели собственной деятельности, определяет пути их достижения:
   -знать методики самооценки, самоконтроля и саморазвития;
  
  УК-6.2 Определяет приоритеты собственной деятельности, выстраивает планы их достижения:
  -уметь решать задачи саморазвития, определять и реализовывать приоритеты совершенствования собственной деятельности в рамках практики;
  
  УК-6.3 Оценивает имеющиеся ресурсы и использует их для решения задач самоорганизации и саморазвития:
  -уметь управлять процессом саморазвития для достижения результатов, соответствующих формируемым компетенциям в рамках индивидуального задания на практику;

  ОПК-3.1. Знать: принципы, методы и средства анализа и структурирования профессиональной информации:
  -знать основные подходы анализа и структурирования профессиональной информации в рамках решаемой на практике задачи;
  
  ПК-3.2. Уметь: анализировать профессиональную информацию, выделять в ней главное, структурировать, оформлять и представлять в виде аналитических обзоров:
  -уметь обрабатывать профессиональную информацию в рамках решаемой задачи, представлять результаты практики в соответствии с указанными требованиями;
  
  ОПК-3.3. Владеть: навыками подготовки научных докладов, публикаций и аналитических обзоров с обоснованными выводами и рекомендациями:
  -уметь подготавливать научные доклады, публикации и аналитические обзоры с обоснованными выводами и рекомендациями в рамках решаемой задачи;

  ОПК-4.1. Знать: новые научные принципы и методы исследований:
  -знать актуальные достижения исследований в рамках предметной области;
  
  ОПК-4.2. Умеет: применять на практике новые научные принципы и методы исследований:
  -уметь использовать актуальные методы решения профессиональной задачи в рамках практики.
