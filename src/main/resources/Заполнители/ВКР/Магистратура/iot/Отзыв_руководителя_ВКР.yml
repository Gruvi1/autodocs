степень: "магистра"
компетенцииВКР:
  УК-1 Способен осуществлять критический анализ проблемных ситуаций на основе системного подхода, вырабатывать стратегию действий:
    - |
      УК-1.1 Знать: методы системного и критического анализа; методики разработки стратегии действий для выявления и решения проблемной ситуации
    - |
      УК-1.2 Уметь: применять методы системного подхода и критического анализа проблемных ситуаций; разрабатывать стратегию действий, принимать конкретные решения для ее реализации
    - |
      УК-1.3 Владеть: методологией системного и критического анализа проблемных ситуаций; методиками постановки цели, определения способов ее достижения, разработки стратегий действий
  УК-2 Способен управлять проектом на всех этапах его жизненного цикла:
    - |
      УК-2.2 Уметь: разрабатывать проект с учетом анализа альтернативных вариантов его  реализации, определять целевые этапы, основные направления работ; объяснить цели и сформулировать задачи, связанные с подготовкой и реализацией проекта; управлять проектом на всех этапах его жизненного цикла
    - |
      УК-2.3 Владеть: методиками разработки и управления проектом; методами оценки потребности в ресурсах и эффективности проекта
  УК-3 Способен организовывать и руководить работой команды, вырабатывая командную стратегию для достижения поставленной цели:
    - |
      УК-3.2 Уметь: разрабатывать план групповых и организационных коммуникаций при подготовке и выполнении проекта; сформулировать задачи членам команды для достижения поставленной цели; разрабатывать командную стратегию; применять эффективные стили руководства командой для достижения поставленной цели
    - |
      УК-3.3 Владеть: умением анализировать, проектировать и организовывать межличностные, групповые и организационные коммуникации в команде для достижения поставленной цели; методами организации и управления коллективом
  УК-4 Способен применять современные коммуникативные технологии, в том числе на иностранном(ых) языке(ах), для академического и профессионального взаимодействия:
    - |
      УК-4.1 Знать: правила и закономерности личной и деловой устной и письменной коммуникации; современные коммуникативные технологии на русском и иностранном языках; существующие профессиональные сообщества для профессионального взаимодействия
    - |
      УК-4.2 Уметь: применять на практике коммуникативные технологии, методы и способы делового общения для академического и профессионального взаимодействия
    - |
      УК-4.3 Владеть: методикой межличностного делового общения на русском и иностранном языках, с применением профессиональных языковых форм, средств и современных коммуникативных технологий
  УК-5 Способен анализировать и учитывать разнообразие культур в процессе межкультурного взаимодействия:
    - |
      УК-5.2 Уметь: понимать и толерантно воспринимать межкультурное разнообразие общества; анализировать и учитывать разнообразие культур в процессе межкультурного взаимодействия
    - |
      УК-5.3 Владеть: методами и навыками эффективного межкультурного взаимодействия
  УК-6 Способен определять и реализовывать приоритеты собственной деятельности и способы ее совершенствования на основе самооценки:
    - |
      УК-6.2 Уметь: решать задачи собственного личностного и профессионального развития, определять и реализовывать приоритеты совершенствования собственной деятельности; применять методики самооценки и самоконтроля; применять методики, позволяющие улучшить и сохранить здоровье в процессе жизнедеятельности
    - |
      УК-6.3 Владеть: технологиями и навыками управления своей познавательной деятельностью и ее совершенствования на основе самооценки, самоконтроля и принципов самообразования в течение всей жизни, в том числе с использованием здоровьесберегающих подходов и методик
  ОПК-1 Способен самостоятельно приобретать, развивать и применять математические, естественнонаучные, социально-экономические и профессиональные знания для решения нестандартных задач, в том числе в новой или незнакомой среде и в междисциплинарном контексте:
    - |
      ОПК-1.2 Уметь: решать нестандартные профессиональные задачи, в том числе в новой или незнакомой среде и в междисциплинарном контексте, с применением математических, естественнонаучных, социально-экономических и профессиональных знаний
    - |
      ОПК-1.3 Владеть: навыками теоретического и экспериментального исследования объектов профессиональной деятельности, в том числе в новой или незнакомой среде и в междисциплинарном контексте
  ОПК-2 Способен разрабатывать оригинальные алгоритмы и программные средства, в том числе с использованием современных интеллектуальных технологий, для решения профессиональных задач:
    - |
      ОПК-2.2 Уметь: обосновывать выбор современных информационно-коммуникационных и интеллектуальных технологий, разрабатывать оригинальные программные средства для решения профессиональных задач
    - |
      ОПК-2.3 Владеть: методами разработки оригинальных программных средств, в том числе с использованием современных информационно-коммуникационных и интеллектуальных технологий, для решения профессиональных задач
  ОПК-3 Способен анализировать профессиональную информацию, выделять в ней главное, структурировать, оформлять и представлять в виде аналитических обзоров с обоснованными выводами и рекомендациями:
    - |
      ОПК-3.2 Уметь: анализировать профессиональную информацию, выделять в ней главное, структурировать, оформлять и представлять в виде аналитических обзоров
    - |
      ОПК-3.3 Владеть: навыками подготовки научных докладов, публикаций и аналитических обзоров с обоснованными выводами и рекомендациями
  ОПК-4 Способен применять на практике новые научные принципы и методы исследований:
    - |
      ОПК-4.2 Умеет: применять на практике новые научные принципы и методы исследований
    - |
      ОПК-4.3 Владеть: навыками применения новых научных принципов и методов исследования для решения профессиональных задач
  ОПК-5 Способен разрабатывать и модернизировать программное и аппаратное обеспечение информационных и автоматизированных систем:
    - |
      ОПК-5.2 Уметь: модернизировать программное и аппаратное обеспечение информационных и автоматизированных систем для решения профессиональных задач
    - |
      ОПК-5.3 Владеть: навыками разработки программного и аппаратного обеспечения информационных и автоматизированных систем для решения профессиональных задач
  ОПК-6 Способен разрабатывать компоненты программно-аппаратных комплексов обработки информации и автоматизированного проектирования:
    - |
      ОПК-6.2 Уметь: анализировать техническое задание, разрабатывать и оптимизировать программный код для решения задач обработки информации и автоматизированного проектирования
    - |
      ОПК-6.3 Владеть: навыками составления технической документации по использованию и настройке компонентов программно-аппаратного комплекса
  ОПК-7 Способен адаптировать зарубежные комплексы обработки информации и автоматизированного проектирования к нуждам отечественных предприятий:
    - |
      ОПК-7.2 Уметь: приводить зарубежные комплексы обработки информации в соответствие с национальными стандартами, интегрировать с отраслевыми информационными системами
    - |
      ОПК-7.3 Владеть: навыками настройки интерфейса, разработки пользовательских шаблонов, подключения библиотек, добавления новых функций
  ОПК-8 Способен осуществлять эффективное управление разработкой программных средств и проектов:
    - |
      ОПК-8.2 Уметь: выбирать средства разработки, оценивать сложность проектов, планировать ресурсы, контролировать сроки выполнения и оценивать качество полученного результата
    - |
      ОПК-8.3 Владеть: навыками разработки технического задания, составления планов, распределения задач, тестирования и оценки качества программных средств
  ПКС-1 Способен осуществлять управление развитием информационной системы организации:
    - |
      ПКС-1.2 Уметь анализировать системные проблемы обработки информации на уровне информационной системы
    - |
      ПКС-1.3 Уметь работать с информацией в условиях неопределенности, избыточности и недостаточности исходных данных
  ПКС-2 Способен осуществлять интеграцию разработанного программного обеспечения:
    - |
      ПКС-2.2 Уметь применять на практике программные средства и платформы информационных технологий
    - |
      ПКС-2.3 Уметь анализировать особенности предметной области и контекста решаемой задачи для обоснованного выбора инструментария