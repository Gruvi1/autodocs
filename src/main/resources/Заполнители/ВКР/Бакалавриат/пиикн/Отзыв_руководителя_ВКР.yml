степень: "бакалавра"
компетенцииВКР:
  УК-1 Способен осуществлять поиск, критический анализ и синтез информации, применять системный подход для решения поставленных задач:
    - |
      УК-1.1 Знать: методики сбора и обработки информации; актуальные российские и зарубежные источники информации в сфере профессиональной деятельности; метод системного анализа
    - |
      УК-1.2 Уметь: применять методики поиска, сбора и обработки информации; осуществлять критический анализ и синтез информации, полученной из разных источников
    - |
      УК-1.3 Владеть: методами поиска, сбора и обработки, критического анализа и синтеза информации; методикой системного подхода для решения поставленных задач
  УК-2 Способен определять круг задач в рамках поставленной цели и выбирать оптимальные способы их решения, исходя из действующих правовых норм, имеющихся ресурсов и ограничений:
    - |
      УК-2.2 Уметь: проводить анализ поставленной цели и формулировать задачи, которые необходимо решить для ее достижения; анализировать альтернативные варианты решений для достижения намеченных результатов; использовать нормативно- правовую документацию в сфере профессиональной деятельности
    - |
      УК-2.3 Владеть: методиками разработки цели и задач проекта; методами оценки потребности в ресурсах, продолжительности и стоимости проекта, навыками работы с нормативно-правовой документацией
  УК-3 Способен осуществлять социальное взаимодействие и реализовывать свою роль в команде:
    - |
      УК-3.2 Уметь: устанавливать и поддерживать контакты, обеспечивающие успешную работу в коллективе; применять основные методы и нормы социального взаимодействия для реализации своей роли и взаимодействия внутри команды
    - |
      УК-3.3 Владеть: простейшими методами и приемами социального взаимодействия и работы в команде
  УК-4 Способен осуществлять деловую коммуникацию в устной и письменной формах на государственном языке Российской Федерации и иностранном(ых) языке(ах):
    - |
      УК-4.1 Знать: принципы построения устного и письменного высказывания на русском и иностранном языках; правила и закономерности деловой устной и письменной коммуникации
    - |
      УК-4.2 Уметь: применять на практике деловую коммуникацию в устной и письменной формах, методы и навыки делового общения на русском и иностранном языках; методикой составления суждения в межличностном деловом общении на русском и иностранном языках
    - |
      УК-4.3 Владеть: навыками чтения и перевода текстов на иностранном языке в профессиональном общении; навыками деловых коммуникаций в устной и письменной форме на русском и иностранных языках; методикой составления суждения в межличностном деловом общении на русском и иностранном языках
  УК-6 Способен управлять своим временем, выстраивать и реализовывать траекторию саморазвития на основе принципов образования в течение всей жизни:
    - |
      УК-6.2 Уметь: эффективно планировать и контролировать собственное время; использовать методы саморегуляции, саморазвития и самообучения
    - |
      УК-6.3 Владеть: методами управления собственным временем; технологиями приобретения, использования и обновления социокультурных и профессиональных знаний, умений, и навыков; методиками саморазвития и самообразования в течение всей жизни
  ОПК-1 Способен применять естественнонаучные и общеинженерные знания, методы математического анализа и моделирования, теоретического и экспериментального исследования в профессиональной деятельности:
    - |
      ОПК-1.2 Уметь: решать стандартные профессиональные задачи с применением естественнонаучных и общеинженерных знаний, методов математического анализа и моделирования
    - |
      ОПК-1.3 Владеть: навыками теоретического и экспериментального исследования объектов профессиональной деятельности
  ОПК-2 Способен использовать современные информационные технологии и программные средства, в том числе отечественного производства, при решении задач профессиональной деятельности:
    - |
      ОПК-2.2 Уметь: выбирать современные информационные технологии и программные средства, в том числе отечественного производства при решении задач профессиональной деятельности
    - |
      ОПК-2.3 Владеть: навыками применения современных информационных технологий и программных средств, в том числе отечественного производства, при решении задач профессиональной деятельности
  ОПК-3 Способен решать стандартные задачи профессиональной деятельности на основе информационной и библиографической культуры с применением информационно- коммуникационных технологий и с учетом основных требований информационной безопасности:
    - |
      ОПК-3.2 Уметь: решать стандартные задачи профессиональной деятельности на основе информационной и библиографической культуры с применением информационно- коммуникационных технологий и с учетом основных требований информационной безопасности 
    - |
      ОПК-3.3 Владеть: навыками подготовки обзоров, аннотаций, составления рефератов, научных докладов, публикаций и библиографии по научно-исследовательской работе с учетом требований информационной безопасности
  ОПК-4 Способен участвовать в разработке стандартов, норм и правил, а также технической документации, связанной с профессиональной деятельностью:
    - |
      ОПК-4.2 Уметь: применять стандарты оформления технической документации на различных стадиях жизненного цикла информационной системы
    - |
      ОПК-4.3 Владеть: навыками составления технической документации на различных этапах жизненного цикла информационной системы
  ОПК-5 Способен инсталлировать программное и аппаратное обеспечение для информационных и автоматизированных систем:
    - |
      ОПК-5.2 Уметь: выполнять параметрическую настройку информационных и автоматизированных систем
    - |
      ОПК-5.3 Владеть: навыками инсталляции программного и аппаратного обеспечения информационных и автоматизированных систем
  ОПК-6 Способен разрабатывать бизнес-планы и технические задания на оснащение отделов, лабораторий, офисов компьютерным и сетевым оборудованием:
    - |
      ОПК-6.2 Уметь: проводить анализ потребностей подразделений в оснащении компьютерным и сетевым оборудованием и составлять бизнес-планы и технические задания на оснащение подразделений
    - |
      ОПК-6.3 Владеть: навыками разработки технических заданий
  ОПК-7 Способен участвовать в настройке и наладке программно-аппаратных комплексов:
    - |
      ОПК-7.2 Уметь: анализировать техническую документацию, производить настройку, наладку и тестирование программно-аппаратных комплексов
    - |
      ОПК-7.3 Владеть: навыками проверки работоспособности программно-аппаратных комплексов
  ОПК-8 Способен разрабатывать алгоритмы и программы, пригодные для практического применения:
    - |
      ОПК-8.2 Уметь: составлять алгоритмы, писать и отлаживать коды на языке программирования, тестировать работоспособность программы, интегрировать программные модули
    - |
      ОПК-8.3 Владеть: языком программирования; навыками отладки и тестирования работоспособности программы
  ОПК-9 Способен осваивать методики использования программных средств для решения практических задач:
    - |
      ОПК-9.2 Уметь: находить и анализировать техническую документацию по использованию программного средства, выбирать и использовать необходимые функции программных средств для решения конкретной задачи
    - |
      ОПК-9.3 Владеть: способами описания методики использования программного средства для решения конкретной задачи в виде документа, презентации или видеоролика
  ПКС-1 Способен осуществлять концептуальное, функциональное и логическое проектирование систем среднего и крупного масштаба и сложности:
    - |
      ПКС-1.2 Владеть: инструментальными средствами моделирования информационных систем
    - |
      ПКС-1.4 Уметь: разрабатывать модели информационных систем для их последующей реализации на выбранном языке программирования
  ПКС-2 Способен разрабатывать компоненты системных программных продуктов:
    - |
      ПКС-2.1 Владеть: навыками разработки программ на языках высокого уровня
    - |
      ПКС-2.2 Владеть: средствами коллективной разработки программного обеспечения
    - |
      ПКС-2.3 Уметь применять знания в области разработки ПО в предметной области
    - |
      ПКС-2.7 Уметь: проводить объектную декомпозицию информационной системы, вырабатывать и обосновывать архитектурное решение
    - |
      ПКС-2.8 Владеть: инструментальными средствами документирования программной архитектуры, включая модель базы данных
